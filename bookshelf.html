<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书库 - 网页书架</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* DESIGN TOKENS */
:root {
  --bg-primary: #F5F5F7;
  --bg-secondary: #FFFFFF;
  --bg-tertiary: #EEEEF0;
  --bg-hover: #E8E8ED;
  --bg-active: #D2D2D7;
  --text-primary: #1D1D1F;
  --text-secondary: #6E6E73;
  --text-tertiary: #A1A1A6;
  --text-inverse: #FFFFFF;
  --accent: #C4A882;
  --accent-light: #E8DCC8;
  --accent-dark: #8B7355;
  --border: rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --shadow-xl: 0 20px 60px rgba(0,0,0,0.15);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --transition: 250ms var(--ease-smooth);
  --transition-slow: 500ms var(--ease-out-expo);
  --mica-bg: rgba(245, 245, 247, 0.72);
  --mica-border: rgba(255, 255, 255, 0.18);
  --acrylic-bg: rgba(255, 255, 255, 0.65);
  --acrylic-border: rgba(255, 255, 255, 0.25);
  --blur-medium: blur(20px) saturate(180%);
  --blur-heavy: blur(40px) saturate(200%);
  --blur-acrylic: blur(30px) saturate(150%) brightness(1.05);
  --font-display: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
  --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --header-height: 60px;
  --grid-gap: 28px;
  --content-padding: 36px;
}
</style>
</head>
<body>
<header class="app-header"><div class="header-left"><span class="header-brand">书库</span></div></header>
<main class="app-main layout-grid" id="appMain"></main>
<script>init();</script>
</body>
</html>
